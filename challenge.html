<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Just a moment...</title>
    <meta name="robots" content="noindex,nofollow">
    <meta http-equiv="Refresh" content="86400">
</head>
<body>
    <div class="main-content">Checking your browser before accessing the website...</div>
    <script>
        if (navigator.webdriver || window.document.documentElement.getAttribute("webdriver") || !window.chrome) {
            console.log("Bot detected. Halting execution.");
        } else {
            setTimeout(() => {
                // Challenge verification delayed
            }, 3000);
        }
    </script>
</body>
</html>
